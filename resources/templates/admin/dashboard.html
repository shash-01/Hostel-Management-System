<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Add Google Font 'Montserrat' -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            /* 1. Background color set */
            background-color: #8D99AE;
            font-family: 'Montserrat', sans-serif; /* 2. Font set */
            color: #FFFFFF;
        }

        /* 3. Dark navbar */
        .navbar {
            background-color: #2B2D42;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .navbar-brand {
            color: #FFFFFF;
            font-weight: 700;
        }

        /* 4. Main content card */
        .content-card {
            background: #2B2D42;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
            margin-top: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h3 {
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 1.5rem;
        }

        /* UPDATED: Add border radius to table container */
        .table-responsive {
            border-radius: 15px;
            overflow: hidden; /* Clips the table corners */
        }

        /* 5. Style table for dark background */
        .table {
            /* UPDATED: New background and text color */
            background-color: #EDF2F4;
            color: #2B2D42;
            border-color: #4A4E69;
            margin-bottom: 0; /* Remove default bootstrap margin */
        }

        .table thead th {
            /* UPDATED: New header colors */
            color: #2B2D42;
            border-bottom-width: 2px;
            border-color: #8D99AE;
            background-color: #dbe2e5; /* Slightly darker shade of the new bg */
        }

        .table tbody tr {
            border-color: #4A4E69;
        }

        .table tbody tr:last-child {
            border-bottom: none; /* Remove last border */
        }

        .table tbody td {
            vertical-align: middle;
        }

        /* Make table rows striped */
        .table-striped tbody tr:nth-of-type(odd) {
            /* UPDATED: New stripe color */
            background-color: #FFFFFF;
        }

        /* 6. Style form elements */
        .form-select {
            background-color: #3A3D54;
            border: 1px solid #4A4E69;
            color: #FFFFFF;
            border-radius: 10px;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23CED4DA' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
        }

        .form-select:focus {
            background-color: #3A3D54;
            border-color: #8D99AE;
            color: #FFFFFF;
            box-shadow: none;
        }

        /* 7. Style buttons */
        .btn-primary {
            background: linear-gradient(145deg, #f0f2f5 0%, #e6e9ee 100%);
            border: none;
            color: #2B2D42;
            font-weight: 500;
        }

        .btn-warning {
            background-color: #f77f00;
            border: none;
            color: #FFFFFF;
            font-weight: 500;
        }

        .btn-logout {
            background: linear-gradient(145deg, #f0f2f5 0%, #e6e9ee 100%);
            border: none;
            color: #2B2D42;
            font-weight: 500;
        }
    </style>
</head>
<body>

<!-- Dark Navbar -->
<nav class="navbar navbar-expand-lg shadow-sm">
    <div class="container">
        <a class="navbar-brand">Admin Dashboard</a>
        <div class="d-flex">
            <!-- Logout Button -->
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-logout" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<!-- Main Content Area -->
<div class="container">
    <div class="content-card">
        <h3>All Requests</h3>

        <!-- UPDATED: Added rounded corners to this container -->
        <div class="table-responsive">
            <!-- UPDATED: Added .table-striped for better readability -->
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Student</th>
                    <th>Type</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Cleaner</th>
                    <th>Assign / Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${requests}">
                    <td th:text="${r.id}">1</td>
                    <td th:text="${r.student != null ? r.student.username : '—'}">student_user</td>
                    <td th:text="${r.serviceType}">CLEANING</td>
                    <td th:text="${r.preferredDate}">2025-10-10</td>
                    <td th:text="${r.status}">PENDING</td>
                    <td th:text="${r.cleaner != null ? r.cleaner.username : '—'}">—</td>
                    <td>
                        <!-- Assign Cleaner Form -->
                        <form th:action="@{/admin/assign}" method="post" class="d-inline-block mb-2 mb-md-0">
                            <input type="hidden" name="requestId" th:value="${r.id}" />
                            <select name="cleanerId" class="form-select d-inline-block" style="width:140px; font-size: 0.9rem;">
                                <option value="">Assign...</option>
                                <option th:each="c : ${cleaners}" th:value="${c.id}" th:text="${c.username}"></option>
                            </select>
                            <button class="btn btn-sm btn-primary">Assign</button>
                        </form>

                        <!-- Change Status Form -->
                        <form th:action="@{/admin/status}" method="post" class="d-inline-block">
                            <input type="hidden" name="requestId" th:value="${r.id}" />
                            <select name="status" class="form-select d-inline-block" style="width:140px; font-size: 0.9rem;">
                                <option value="">Status...</option>
                                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                            </select>
                            <button class="btn btn-sm btn-warning">Update</button>
                        </form>
                    </td>
                </tr>
                <!-- Example Row 2 -->
                <tr>
                    <td>2</td>
                    <td>other_student</td>
                    <td>ELECTRICAL</td>
                    <td>2025-10-11</td>
                    <td>ASSIGNED</td>
                    <td>cleaner_user</td>
                    <td>
                        <form th:action="@{/admin/assign}" method="post" class="d-inline-block mb-2 mb-md-0">
                            <input type="hidden" name="requestId" value="2" />
                            <select name="cleanerId" class="form-select d-inline-block" style="width:140px; font-size: 0.9rem;">
                                <option value="">Assign...</option>
                                <option value="1" selected>cleaner_user</option>
                            </select>
                            <button class="btn btn-sm btn-primary">Assign</button>
                        </form>
                        <form th:action="@{/admin/status}" method="post" class="d-inline-block">
                            <input type="hidden" name="requestId" value="2" />
                            <select name="status" class="form-select d-inline-block" style="width:140px; font-size: 0.9rem;">
                                <option value="">Status...</option>
                                <option value="ASSIGNED" selected>ASSIGNED</option>
                                <option value="COMPLETED">COMPLETED</option>
                            </select>
                            <button class="btn btn-sm btn-warning">Update</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
