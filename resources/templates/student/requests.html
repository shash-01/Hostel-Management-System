<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>My Requests</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Add Google Font 'Montserrat' -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            /* 1. Background color set */
            background-color: #8D99AE;
            font-family: 'Montserrat', sans-serif; /* 2. Font set */
            color: #FFFFFF;
        }

        /* 3. Dark navbar */
        .navbar {
            background-color: #2B2D42;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .navbar-brand {
            color: #FFFFFF;
            font-weight: 700;
        }

        /* 4. Main content card */
        .content-card {
            background: #2B2D42;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
            margin-top: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h3 {
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 1.5rem;
        }

        /* 5. Rounded table container */
        .table-responsive {
            border-radius: 15px;
            overflow: hidden; /* Clips the table corners */
        }

        /* 6. Style table */
        .table {
            background-color: #EDF2F4;
            color: #2B2D42;
            border-color: #4A4E69;
            margin-bottom: 0;
        }

        .table thead th {
            color: #2B2D42;
            border-bottom-width: 2px;
            border-color: #8D99AE;
            background-color: #dbe2e5;
        }

        .table tbody tr {
            border-color: #4A4E69;
        }

        .table tbody tr:last-child {
            border-bottom: none;
        }

        .table tbody td {
            vertical-align: middle;
        }

        .table-striped tbody tr:nth-of-type(odd) {
            background-color: #FFFFFF;
        }

        /* 7. Style buttons */
        .btn-back {
            color: #CED4DA;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        .btn-back:hover {
            color: #FFFFFF;
            text-decoration: underline;
        }

        .btn-logout {
            background: linear-gradient(145deg, #f0f2f5 0%, #e6e9ee 100%);
            border: none;
            color: #2B2D42;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-logout:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 7px 22px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>

<!-- Dark Navbar -->
<nav class="navbar navbar-expand-lg shadow-sm">
    <div class="container">
        <a class="navbar-brand">My Requests</a>
        <div class="d-flex">
            <!-- Logout Button -->
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-logout" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<!-- Main Content Area -->
<div class="container">
    <div class="content-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Your Requests</h3>
            <!-- "Back to Dashboard" link -->
            <a class="btn-back" href="/student/dashboard">Back to Dashboard</a>
        </div>

        <div class="table-responsive">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Type</th>
                    <th>Preferred Date</th>
                    <th>Status</th>
                    <th>Cleaner</th>
                </tr>
                </thead>
                <tbody>
                <!-- Use th:if to check if requests is empty -->
                <tr th:if="${requests == null or requests.isEmpty()}">
                    <td colspan="5" class="text-center">You have not made any requests yet.</td>
                </tr>
                <!-- Loop over requests if not empty -->
                <tr th:each="r : ${requests}">
                    <td th:text="${r.id}">1</td>
                    <td th:text="${r.serviceType}">CLEANING</td>
                    <td th:text="${r.preferredDate}">2025-11-10</td>
                    <td th:text="${r.status}">PENDING</td>
                    <td th:text="${r.cleaner != null ? r.cleaner.username : '—'}">—</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
