<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Book Service</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Add Google Font 'Montserrat' -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            /* 1. Background color set */
            background-color: #8D99AE;
            font-family: 'Montserrat', sans-serif; /* 2. Font set */
            color: #FFFFFF;
        }

        /* 3. Dark navbar */
        .navbar {
            background-color: #2B2D42;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .navbar-brand {
            color: #FFFFFF;
            font-weight: 700;
        }

        /* 4. Main content card */
        .content-card {
            background: #2B2D42;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
            margin-top: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 600px; /* Constrain width for a form */
        }

        h3 {
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 1.5rem;
        }

        /* 5. Style form elements for dark background */
        .form-label {
            color: #CED4DA;
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            background-color: #3A3D54;
            border: 1px solid #4A4E69;
            color: #FFFFFF;
            border-radius: 10px;
            padding: 0.75rem 1rem;
        }

        /* Make select arrow white */
        .form-select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23CED4DA' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
        }

        /* Style for date picker text */
        .form-control[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        .form-control:focus, .form-select:focus {
            background-color: #3A3D54;
            border-color: #8D99AE;
            color: #FFFFFF;
            box-shadow: none;
        }

        textarea.form-control {
            min-height: 120px;
        }

        /* 6. Style buttons */
        .btn-submit {
            background: linear-gradient(145deg, #f0f2f5 0%, #e6e9ee 100%);
            border: none;
            color: #2B2D42;
            font-weight: 500;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            font-size: 1.1rem;
        }

        .btn-submit:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 7px 22px rgba(0, 0, 0, 0.2);
        }

        .btn-logout {
            background: linear-gradient(145deg, #f0f2f5 0%, #e6e9ee 100%);
            border: none;
            color: #2B2D42;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-logout:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 7px 22px rgba(0, 0, 0, 0.2);
        }

        .btn-back {
            color: #CED4DA;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        .btn-back:hover {
            color: #FFFFFF;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<!-- Dark Navbar -->
<nav class="navbar navbar-expand-lg shadow-sm">
    <div class="container">
        <a class="navbar-brand">Student Dashboard</a>
        <div class="d-flex">
            <!-- Logout Button -->
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-logout" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<!-- Main Content Area -->
<div class="container">
    <!-- Center the card -->
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
            <div class="content-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3>New Service Request</h3>
                    <a href="/student/dashboard" class="btn-back">Back to Dashboard</a>
                </div>

                <!-- Booking Form -->
                <form th:action="@{/student/book}" th:object="${request}" method="post">

                    <!-- Service Type -->
                    <div class="mb-3">
                        <label for="serviceType" class="form-label">Service Type</label>
                        <select id="serviceType" class="form-select" th:field="*{serviceType}" required>
                            <option value="" disabled selected>Select a service...</option>
                            <option th:each="type : ${types}"
                                    th:value="${type}"
                                    th:text="${type.name().substring(0,1) + type.name().substring(1).toLowerCase()}">
                                Cleaning
                            </option>
                        </select>
                    </div>

                    <!-- Preferred Date -->
                    <div class="mb-3">
                        <label for="preferredDate" class="form-label">Preferred Date</label>
                        <input type="date" id="preferredDate" class="form-control"
                               th:field="*{preferredDate}"
                               th:min="${minDate}" required />
                    </div>

                    <!-- Description -->
                    <div class="mb-4">
                        <label for="description" class="form-label">Description (Optional)</label>
                        <textarea id="description" class="form-control"
                                  th:field="*{description}"
                                  placeholder="E.g., My sink is leaking, the ceiling light won't turn on...">
                        </textarea>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn-submit">Submit Request</button>
                </form>

            </div>
        </div>
    </div>
</div>

</body>
</html>
