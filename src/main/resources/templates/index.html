<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title>Hostel Management</title>
    <!-- We'll keep Bootstrap for other pages, but this page won't use it -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Add Google Font for a modern feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            overflow: hidden; /* Prevent scroll bars */
        }

        body {
            /* 1. Background color set */
            background-color: #8D99AE;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
        }

        /* 2. Main card with new background */
        .welcome-card {
            /* Solid dark background for the card */
            background: #2B2D42;
            padding: 2.5rem 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .welcome-card h1 {
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 0.75rem;
        }

        .welcome-card p {
            font-size: 1.1rem;
            color: #CED4DA;
            margin-bottom: 2.5rem;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 1.25rem; /* More spacing */
        }

        /* 3. Login/Signup buttons styled as cards */
        .welcome-btn {
            display: block;
            padding: 1rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
            /* 5. Change text color for new gradient */
            color: #2B2D42;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* 4. Slight animation on hover */
        .welcome-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 7px 22px rgba(0, 0, 0, 0.2);
        }

        .welcome-btn:active {
             transform: translateY(-1px) scale(1.01);
             box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .btn-login {
            /* 6. Button gradient */
            background: linear-gradient(145deg, #EDF2F4, #8D99AE);
        }

        .btn-signup {
            /* 7. Button gradient */
            background: linear-gradient(145deg, #EDF2F4, #8D99AE);
        }
    </style>
</head>
<!-- Removed container and other layout classes from body -->
<body>

<!-- Replaced old layout with a single centered card -->
<div class="welcome-card">
    <h1 class="mb-3">Hostel Management</h1>
    <p>Welcome. Please log in or sign up to continue.</p>
    <div class="button-container">
        <a href="/login" class="welcome-btn btn-login">Student / Admin Login</a>
        <a href="/signup" class="welcome-btn btn-signup">Sign Up</a>
    </div>
</div>

</body>
</html>
