<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title>Login</title>
    <!-- Keep Bootstrap for grid system and form controls -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Add Google Font 'Montserrat' -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
        }

        body {
            /* 1. Background color set */
            background-color: #8D99AE;
            font-family: 'Montserrat', sans-serif; /* 7. Font set */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
        }

        /* 2. Main card with new background */
        .login-card {
            background: #2B2D42;
            padding: 2.5rem 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
            text-align: left; /* Forms look better left-aligned */
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .login-card h1 {
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 2rem;
            text-align: center; /* Center the title */
        }

        /* 3. Style form elements for dark background */
        .form-label {
            color: #CED4DA;
            margin-bottom: 0.5rem;
        }

        .form-control {
            background-color: #3A3D54;
            border: 1px solid #4A4E69;
            color: #FFFFFF;
            border-radius: 10px;
            padding: 0.75rem 1rem;
        }

        .form-control:focus {
            background-color: #3A3D54;
            border-color: #8D99AE;
            color: #FFFFFF;
            box-shadow: none;
        }

        /* 4. Login button with gradient */
        .login-btn {
            display: block;
            width: 100%;
            padding: 0.75rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            color: #2B2D42;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            /* UPDATED GRADIENT */
            background: linear-gradient(145deg, #f0f2f5 0%, #e6e9ee 100%);
            border: none;
            margin-top: 1.5rem;
        }

        .login-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 7px 22px rgba(0, 0, 0, 0.2);
        }

        /* 5. Style the "Create account" link */
        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .signup-link a {
            color: #CED4DA;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .signup-link a:hover {
            color: #FFFFFF;
            text-decoration: underline;
        }

        /* 6. Style the error message */
        .alert-danger {
            background-color: #D90429;
            color: #FFFFFF;
            border: 1px solid #EF233C;
            border-radius: 10px;
        }

        .alert-success {
            background-color: #2a9d8f;
            color: #FFFFFF;
            border: 1px solid #264653;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h1>Login</h1>

    <!-- ✅ FIX: Add Thymeleaf error handling -->
    <div th:if="${param.error}" class="alert alert-danger" role="alert">
        <!-- This shows the "Invalid username or password" from Spring Security -->
        <span th:if="${session['SPRING_SECURITY_LAST_EXCEPTION']}" th:text="${session['SPRING_SECURITY_LAST_EXCEPTION'].message}">
                Bad credentials
            </span>
        <!-- This shows our custom "UnknownRole" error -->
        <span th:if="${param.error == 'UnknownRole'}">
                Login successful, but user has no valid role.
            </span>
    </div>

    <!-- This shows the "registered" message -->
    <div th:if="${param.registered != null}" class="alert alert-success" role="alert">
        Registration successful! Please log in.
    </div>


    <!-- ✅ FIX: Use th:action to include CSRF token (if you ever enable it) -->
    <form method="post" th:action="@{/login}">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input name="username" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input name="password" type="password" class="form-control" required />
        </div>
        <button class="login-btn">Login</button>
    </form>
    <hr class="my-4" style="border-color: #4A4E69;"/>
    <div class="signup-link">
        <a href="/signup">Create account</a>
    </div>
</div>

</body>
</html>
