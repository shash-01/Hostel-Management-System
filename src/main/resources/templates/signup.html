<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title>Sign Up</title>
    <!-- Keep Bootstrap for grid system and form controls -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Add Google Font 'Montserrat' -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
        }

        body {
            /* 1. Background color set */
            background-color: #8D99AE;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            padding: 2rem 0; /* Add padding for smaller screens where card is tall */
        }

        /* 2. Main card with new background */
        .signup-card {
            background: #2B2D42;
            padding: 2.5rem 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
            text-align: left;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .signup-card h1 {
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 2rem;
            text-align: center;
        }

        /* 3. Style form elements for dark background */
        .form-label {
            color: #CED4DA;
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            background-color: #3A3D54;
            border: 1px solid #4A4E69;
            color: #FFFFFF;
            border-radius: 10px;
            padding: 0.75rem 1rem;
        }

        /* Make select arrow white */
        .form-select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23CED4DA' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
        }

        .form-control:focus, .form-select:focus {
            background-color: #3A3D54;
            border-color: #8D99AE;
            color: #FFFFFF;
            box-shadow: none;
        }

        /* 4. Signup button with gradient */
        .signup-btn {
            display: block;
            width: 100%;
            padding: 0.75rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            color: #2B2D42;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            background: linear-gradient(145deg, #f0f2f5 0%, #e6e9ee 100%);
            border: none;
            margin-top: 1.5rem;
        }

        .signup-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 7px 22px rgba(0, 0, 0, 0.2);
        }

        /* 5. Style the "Login" link */
        .login-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .login-link a {
            color: #CED4DA;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .login-link a:hover {
            color: #FFFFFF;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="signup-card">
    <h1>Create Account</h1>

    <!-- Signup Form -->
    <form th:action="@{/signup}" th:object="${user}" method="post">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input class="form-control" th:field="*{username}" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" th:field="*{password}" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" th:field="*{email}" />
        </div>
        <div class="mb-3">
            <label class="form-label">Role</label>
            <select name="role" class="form-select">
                <option value="student">Student</option>
                <option value="admin">Admin</option>
                <option value="cleaner">Cleaner</option>
            </select>
        </div>
        <button class="signup-btn">Create Account</button>
    </form>

    <hr class="my-4" style="border-color: #4A4E69;"/>

    <div class="login-link">
        <a href="/login">Already have an account? Login</a>
    </div>
</div>

</body>
</html>
